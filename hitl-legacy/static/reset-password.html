<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HITL — Reinitialisation mot de passe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css?v=1">
  <style>
    body { overflow: auto; }
    .reset-success { color: var(--green); font-size: 11px; text-align: center; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>
  <div class="login-overlay" style="position:relative;min-height:100vh">
    <div class="login-box">
      <div class="login-logo">&#x2B21;</div>
      <div class="login-title">Reinitialisation</div>
      <div class="login-sub">Definissez votre nouveau mot de passe</div>
      <div class="login-error" id="reset-error"></div>
      <div class="reset-success" id="reset-success"></div>
      <div class="form-group">
        <div class="form-label">EMAIL</div>
        <input class="form-input" id="reset-email" placeholder="you@company.com" readonly />
      </div>
      <div class="form-group">
        <div class="form-label">ANCIEN MOT DE PASSE</div>
        <input class="form-input" id="reset-old-password" type="password" placeholder="Mot de passe temporaire" />
      </div>
      <div class="form-group">
        <div class="form-label">NOUVEAU MOT DE PASSE</div>
        <input class="form-input" id="reset-new-password" type="password" placeholder="Minimum 6 caracteres" />
      </div>
      <div class="form-group">
        <div class="form-label">CONFIRMER</div>
        <input class="form-input" id="reset-confirm-password" type="password" placeholder="Confirmer le nouveau mot de passe" />
      </div>
      <button class="btn btn-primary" id="reset-btn" style="width:100%;letter-spacing:2px" onclick="doReset()">CONFIRMER</button>
      <div style="text-align:center;margin-top:14px">
        <a style="font-size:10px;color:var(--accent-light);cursor:pointer" href="/">Retour a la connexion</a>
      </div>
    </div>
  </div>

  <script>
    // Pre-fill from URL params
    const params = new URLSearchParams(window.location.search);
    const email = params.get('mail') || '';
    const tempPwd = params.get('pwd') || '';
    document.getElementById('reset-email').value = email;
    document.getElementById('reset-old-password').value = tempPwd;

    function showError(msg) {
      const el = document.getElementById('reset-error');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
      document.getElementById('reset-success').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('reset-success');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
      document.getElementById('reset-error').style.display = 'none';
    }

    async function doReset() {
      showError('');
      const emailVal = document.getElementById('reset-email').value.trim();
      const oldPwd = document.getElementById('reset-old-password').value;
      const newPwd = document.getElementById('reset-new-password').value;
      const confirmPwd = document.getElementById('reset-confirm-password').value;

      if (!emailVal) { showError('Email requis'); return; }
      if (!oldPwd) { showError('Ancien mot de passe requis'); return; }
      if (!newPwd || newPwd.length < 6) { showError('Le nouveau mot de passe doit faire au moins 6 caracteres'); return; }
      if (newPwd !== confirmPwd) { showError('Les mots de passe ne correspondent pas'); return; }

      const btn = document.getElementById('reset-btn');
      btn.disabled = true;
      btn.textContent = '...';

      try {
        const resp = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailVal, old_password: oldPwd, new_password: newPwd }),
        });
        const data = await resp.json();
        if (!resp.ok) {
          showError(data.detail || 'Erreur');
          return;
        }
        showSuccess('Mot de passe mis a jour. Redirection...');
        setTimeout(() => { window.location.href = '/'; }, 2000);
      } catch (e) {
        showError('Erreur reseau');
      } finally {
        btn.disabled = false;
        btn.textContent = 'CONFIRMER';
      }
    }

    // Allow Enter key to submit
    document.querySelectorAll('.form-input').forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
    });
  </script>
</body>
</html>
