networks:
  langgraph-net:
    driver: bridge

services:
  langgraph-postgres:
    image: pgvector/pgvector:pg16
    container_name: langgraph-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/langgraph-data/postgres:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - postgres
      - -c
      - shared_preload_libraries=vector
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=16MB
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - langgraph-net

  langgraph-redis:
    image: redis:7-alpine
    container_name: langgraph-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - /opt/langgraph-data/redis:/data
    healthcheck:
      test: redis-cli -a ${REDIS_PASSWORD} ping
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      - langgraph-net

  langgraph-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph-api
    restart: unless-stopped
    ports:
      - "0.0.0.0:8123:8000"
    depends_on:
      langgraph-postgres:
        condition: service_healthy
      langgraph-redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URI: ${DATABASE_URI}
      REDIS_URI: ${REDIS_URI}
    # No volumes for code/config — baked into image (COPY in Dockerfile)
    # Mounting local dirs breaks case-sensitive renames (Shared → shared)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - langgraph-net

  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile.discord
    container_name: langgraph-discord
    restart: unless-stopped
    depends_on:
      langgraph-api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      LANGGRAPH_API_URL: http://langgraph-api:8000
    networks:
      - langgraph-net

  mail-bot:
    build:
      context: .
      dockerfile: Dockerfile.mail
    container_name: langgraph-mail
    restart: unless-stopped
    depends_on:
      langgraph-api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      LANGGRAPH_API_URL: http://langgraph-api:8000
    networks:
      - langgraph-net

  langgraph-admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: langgraph-admin
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:8080"
    depends_on:
      langgraph-postgres:
        condition: service_healthy
    volumes:
      - .:/project
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      LANGGRAPH_API_URL: http://langgraph-api:8000
      DATABASE_URI: ${DATABASE_URI}
    networks:
      - langgraph-net

  # ── HITL Console ─────────────────────────────
  hitl-console:
    build:
      context: .
      dockerfile: Dockerfile.hitl
    container_name: langgraph-hitl
    restart: unless-stopped
    ports:
      - "0.0.0.0:8090:8090"
    depends_on:
      langgraph-postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config
    env_file:
      - .env
    environment:
      DATABASE_URI: ${DATABASE_URI}
      LANGGRAPH_API_URL: http://langgraph-api:8000
    networks:
      - langgraph-net

  # ── MinIO (S3-compatible storage for Outline) ──
  minio:
    image: minio/minio:latest
    container_name: langgraph-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - /opt/langgraph-data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - langgraph-net

  # ── Outline DB init (one-shot) ──────────────────
  outline-db-init:
    image: pgvector/pgvector:pg16
    container_name: outline-db-init
    depends_on:
      langgraph-postgres:
        condition: service_healthy
    environment:
      PGHOST: langgraph-postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: >
      sh -c "psql -tc \"SELECT 1 FROM pg_database WHERE datname='outline'\" | grep -q 1 || psql -c 'CREATE DATABASE outline;'"
    restart: "no"
    networks:
      - langgraph-net

  # ── Outline Wiki ────────────────────────────────
  outline:
    image: outlinewiki/outline:latest
    container_name: langgraph-outline
    restart: unless-stopped
    ports:
      - "0.0.0.0:3200:3000"
    depends_on:
      langgraph-postgres:
        condition: service_healthy
      langgraph-redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      outline-db-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      SECRET_KEY: ${OUTLINE_SECRET_KEY}
      UTILS_SECRET: ${OUTLINE_UTILS_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@langgraph-postgres:5432/outline
      REDIS_URL: redis://:${REDIS_PASSWORD}@langgraph-redis:6379/1
      URL: ${OUTLINE_URL:-http://localhost:3200}
      PORT: 3000
      FILE_STORAGE: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION: us-east-1
      AWS_S3_UPLOAD_BUCKET_NAME: ${AWS_S3_UPLOAD_BUCKET_NAME:-outline}
      AWS_S3_UPLOAD_BUCKET_URL: ${AWS_S3_UPLOAD_BUCKET_URL:-http://minio:9000}
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_S3_ACL: private
      PGSSLMODE: disable
      FORCE_HTTPS: "false"
    networks:
      - langgraph-net

  # ── OpenLIT Observability (2 containers) ──────
  openlit-clickhouse:
    image: clickhouse/clickhouse-server:24.4.1
    container_name: openlit-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_PASSWORD: ${OPENLIT_DB_PASSWORD:-OPENLIT}
      CLICKHOUSE_USER: ${OPENLIT_DB_USER:-default}
      CLICKHOUSE_DATABASE: ${OPENLIT_DB_NAME:-openlit}
      CLICKHOUSE_ALWAYS_RUN_INITDB_SCRIPTS: "true"
    volumes:
      - /opt/langgraph-data/openlit-clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=$${CLICKHOUSE_USER} --password=$${CLICKHOUSE_PASSWORD} --query='SELECT 1' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 60s
    networks:
      - langgraph-net

  openlit:
    image: ghcr.io/openlit/openlit:latest
    container_name: openlit
    restart: unless-stopped
    environment:
      INIT_DB_HOST: openlit-clickhouse
      INIT_DB_PORT: 8123
      INIT_DB_DATABASE: ${OPENLIT_DB_NAME:-openlit}
      INIT_DB_USERNAME: ${OPENLIT_DB_USER:-default}
      INIT_DB_PASSWORD: ${OPENLIT_DB_PASSWORD:-OPENLIT}
      SQLITE_DATABASE_URL: file:/app/client/data/data.db
      PORT: 3000
      DOCKER_PORT: 3000
    ports:
      - "0.0.0.0:3000:3000"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    depends_on:
      openlit-clickhouse:
        condition: service_healthy
    volumes:
      - /opt/langgraph-data/openlit:/app/client/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - langgraph-net
