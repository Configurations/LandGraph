name: Build hitl-console

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag_prefix:
        required: true
        type: string
      tag_latest:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: "Version tag (e.g., v0.0.19)"
      tag_prefix:
        required: false
        type: string
        default: "dev-"
        description: "Tag prefix (empty for main, 'dev-' for dev)"
      tag_latest:
        required: false
        type: string
        default: dev
        description: "Latest tag (latest for main, branch name for others)"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.hitl
          push: true
          tags: |
            ghcr.io/configurations/langgraph-hitl:${{ inputs.tag_prefix }}${{ inputs.version }}
            ghcr.io/configurations/langgraph-hitl:${{ inputs.tag_latest }}
            ${{ secrets.DOCKER_USER }}/langgraph-hitl:${{ inputs.tag_prefix }}${{ inputs.version }}
            ${{ secrets.DOCKER_USER }}/langgraph-hitl:${{ inputs.tag_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
