name: Build mail-bot

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      branch:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: "Version tag (e.g., v0.0.19)"
      branch:
        required: true
        type: string
        default: dev
        description: "Branch name for image tag"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.mail
          push: true
          tags: |
            ghcr.io/configurations/langgraph-mail:${{ inputs.branch }}-${{ inputs.version }}
            ghcr.io/configurations/langgraph-mail:${{ inputs.branch }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
