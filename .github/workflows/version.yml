name: Auto Version & Build

on:
  push:
    branches: [main, dev]

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      branch: ${{ steps.branch.outputs.branch }}
      tag_prefix: ${{ steps.branch.outputs.tag_prefix }}
      tag_latest: ${{ steps.branch.outputs.tag_latest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get branch name and compute tags
        id: branch
        run: |
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag_prefix=" >> $GITHUB_OUTPUT
            echo "tag_latest=latest" >> $GITHUB_OUTPUT
          else
            echo "tag_prefix=${GITHUB_REF_NAME}-" >> $GITHUB_OUTPUT
            echo "tag_latest=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Get latest tag
        id: tag
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            echo "version=v0.0.0" >> $GITHUB_OUTPUT
          else
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Bump patch version
        id: bump
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          VERSION="${VERSION#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumping ${{ steps.tag.outputs.version }} -> $NEW"

      - name: Create tag
        run: |
          git tag ${{ steps.bump.outputs.new_version }}
          git push origin ${{ steps.bump.outputs.new_version }}

  build-api:
    needs: version
    uses: ./.github/workflows/build-langgraph-api.yml
    secrets: inherit
    with:
      version: ${{ needs.version.outputs.new_version }}
      tag_prefix: ${{ needs.version.outputs.tag_prefix }}
      tag_latest: ${{ needs.version.outputs.tag_latest }}

  build-admin:
    needs: version
    uses: ./.github/workflows/build-langgraph-admin.yml
    secrets: inherit
    with:
      version: ${{ needs.version.outputs.new_version }}
      tag_prefix: ${{ needs.version.outputs.tag_prefix }}
      tag_latest: ${{ needs.version.outputs.tag_latest }}

  build-discord:
    needs: version
    uses: ./.github/workflows/build-discord-bot.yml
    secrets: inherit
    with:
      version: ${{ needs.version.outputs.new_version }}
      tag_prefix: ${{ needs.version.outputs.tag_prefix }}
      tag_latest: ${{ needs.version.outputs.tag_latest }}

  build-mail:
    needs: version
    uses: ./.github/workflows/build-mail-bot.yml
    secrets: inherit
    with:
      version: ${{ needs.version.outputs.new_version }}
      tag_prefix: ${{ needs.version.outputs.tag_prefix }}
      tag_latest: ${{ needs.version.outputs.tag_latest }}

  build-hitl:
    needs: version
    uses: ./.github/workflows/build-hitl-console.yml
    secrets: inherit
    with:
      version: ${{ needs.version.outputs.new_version }}
      tag_prefix: ${{ needs.version.outputs.tag_prefix }}
      tag_latest: ${{ needs.version.outputs.tag_latest }}
