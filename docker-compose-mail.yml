  # Ajouter dans docker-compose.yml (dans services:)

  mail-bot:
    build:
      context: .
      dockerfile: Dockerfile.mail
    container_name: langgraph-mail
    restart: unless-stopped
    depends_on:
      langgraph-api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      LANGGRAPH_API_URL: http://langgraph-api:8000
    networks:
      - langgraph-net
